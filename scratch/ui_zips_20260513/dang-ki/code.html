<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VN-Invest Pro - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-surface": "#e0e3e5",
                        "surface": "#101415",
                        "on-surface-variant": "#c6c6cd",
                        "primary-fixed-dim": "#bec6e0",
                        "on-tertiary": "#002e6a",
                        "on-primary-container": "#798098",
                        "error-container": "#93000a",
                        "on-tertiary-container": "#357df1",
                        "surface-bright": "#363a3b",
                        "primary-fixed": "#dae2fd",
                        "surface-container-lowest": "#0b0f10",
                        "on-secondary": "#003824",
                        "surface-tint": "#bec6e0",
                        "surface-container": "#1d2022",
                        "background": "#101415",
                        "surface-container-high": "#272a2c",
                        "secondary-container": "#00a572",
                        "on-tertiary-fixed-variant": "#004395",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-dim": "#101415",
                        "secondary-fixed": "#6ffbbe",
                        "secondary": "#4edea3",
                        "on-secondary-container": "#00311f",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#3f465c",
                        "inverse-primary": "#565e74",
                        "on-background": "#e0e3e5",
                        "on-primary": "#283044",
                        "inverse-on-surface": "#2d3133",
                        "tertiary-fixed-dim": "#adc6ff",
                        "tertiary-container": "#00163a",
                        "primary": "#bec6e0",
                        "on-tertiary-fixed": "#001a42",
                        "on-primary-fixed": "#131b2e",
                        "surface-container-highest": "#323537",
                        "outline-variant": "#45464d",
                        "tertiary": "#adc6ff",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary-fixed": "#d8e2ff",
                        "on-error": "#690005",
                        "on-secondary-fixed": "#002113",
                        "on-surface": "#e0e3e5",
                        "surface-container-low": "#191c1e",
                        "primary-container": "#0f172a",
                        "outline": "#909097",
                        "surface-variant": "#323537"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-mobile": "20px",
                        "gutter": "24px",
                        "container-max": "1440px",
                        "unit": "8px",
                        "margin-desktop": "64px"
                    },
                    fontFamily: {
                        "label-sm": ["Inter"],
                        "headline-md": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Manrope"],
                        "body-md": ["Inter"],
                        "data-point-lg": ["Inter"]
                    },
                    fontSize: {
                        "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
                        "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "data-point-lg": ["28px", { lineHeight: "34px", letterSpacing: "0.02em", fontWeight: "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md text-on-surface">
<!-- Atmospheric Gradient Background -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-tertiary-container/20 blur-[150px]"></div>
</div>
<!-- Registration Card -->
<main class="w-full max-w-[480px] px-margin-mobile md:px-0 relative z-10">
<div class="bg-surface-container/40 backdrop-blur-[20px] border border-white/5 rounded-xl shadow-[0_8px_32px_rgba(0,0,0,0.4),0_1px_2px_rgba(0,0,0,0.2)] p-8 md:p-10">
<!-- Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-surface-container-highest border border-white/10 shadow-inner mb-6">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">query_stats</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Tạo tài khoản mới</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Bắt đầu hành trình đầu tư giá trị</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Full Name -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2" for="fullname">Họ và tên</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-[20px]">person</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/30 rounded pl-11 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 transition-colors" id="fullname" name="fullname" placeholder="Nhập họ và tên của bạn" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-[20px]">mail</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/30 rounded pl-11 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 transition-colors" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2" for="password">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-[20px]">lock</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/30 rounded pl-11 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 transition-colors" id="password" name="password" placeholder="Tối thiểu 8 ký tự" required="" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2" for="confirm-password">Xác nhận mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-[20px]">lock_reset</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/30 rounded pl-11 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 transition-colors" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required="" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant/50 bg-surface-container-lowest text-secondary focus:ring-secondary focus:ring-offset-surface-container" id="terms" name="terms" required="" type="checkbox"/>
</div>
<label class="font-label-sm text-label-sm text-on-surface-variant leading-relaxed" for="terms">
                        Tôi đồng ý với <a class="text-secondary hover:text-secondary-fixed transition-colors" href="#">Điều khoản dịch vụ</a> và <a class="text-secondary hover:text-secondary-fixed transition-colors" href="#">Chính sách bảo mật</a> của VN-Invest Pro.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-secondary-container to-secondary text-on-secondary font-label-sm text-label-sm py-3 px-4 rounded shadow-[inset_0_1px_0_rgba(255,255,255,0.2),0_4px_12px_rgba(0,165,114,0.2)] hover:shadow-[inset_0_1px_0_rgba(255,255,255,0.3),0_6px_16px_rgba(0,165,114,0.3)] hover:-translate-y-0.5 transition-all duration-200 mt-4" type="submit">
                    Đăng ký tài khoản
                </button>
</form>
<!-- Footer -->
<div class="mt-8 text-center font-label-sm text-label-sm text-on-surface-variant">
                Đã có tài khoản? <a class="text-secondary hover:text-secondary-fixed font-semibold transition-colors" href="#">Đăng nhập ngay</a>
</div>
</div>
</main>
</body></html>
