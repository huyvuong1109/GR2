          theme: {

                      "on-surface": "#e0e3e5",
                      "on-background": "#e0e3e5",
                      "surface-container-low": "#191c1e",

                      "on-error": "#690005",
                      "surface-variant": "#323537",
                      "surface-container-highest": "#323537",
                      "outline-variant": "#45464d",
                      "secondary-fixed-dim": "#4edea3",
                      "secondary-fixed": "#6ffbbe",
                      "on-secondary-fixed": "#002113",

                      "secondary-container": "#00a572",
                      "on-primary-container": "#798098",

                      "inverse-primary": "#565e74"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "24px",
                      "margin-desktop": "64px",
                      "unit": "8px",
                      "margin-mobile": "20px",
                      "container-max": "1440px"
              },
              "fontFamily": {
                      "headline-md": [
                              "Manrope"
                      ],
                      "display-lg": [
                              "Manrope"
                      ],
                      "data-point-lg": [
                              "Inter"
                      ],
                      "body-lg": [
                              "Inter"
                      ],
                      "body-md": [
                              "Inter"
                      ],
                      "label-sm": [

                      ],

                      ]
              },

<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background Image -->
<div class="absolute inset-0 z-0">
<img alt="" class="w-full h-full object-cover object-center opacity-40" data-alt="A wide angle, high fidelity shot of a modern financial district at night. The skyscrapers are constructed of dark glass and steel, illuminated by precise, cool-toned internal lighting. The overall mood is sophisticated, authoritative, and calm, perfectly aligning with a high-end, multi-layered dark mode aesthetic. Subtle atmospheric glows suggest deep intelligence and institutional reliability." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMiu-Htzr3osvIIckQBhFKbgoiOopD7gOhnu7xB8dMV1ZU4Nujp5CKTZfY8v6GvRoE1jU5qomeVQ4qasmSNrITlsZvhIIu319rqL9Jjwj1Skh_Xe_boqeCan5GmKPkLLG4jpMwCK-H0NHuxHc3qEo5XMpIGuqiDDnpAvl9M6fQPfE0Zub0YZY3K-wu54c50ITzfTQEQfmi2iSUBJizyHahhmbzTraYhGTm0kV58rHAi3qNjTQ2pDl9dlq2N7O3P0gcAuuVGTmNxzU0"/>
<!-- Gradient Overlay for Depth -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-primary/10 via-surface-dim/80 to-background/95"></div>
</div>
<!-- Login Container (Glassmorphism Card) -->
<main class="relative z-10 w-full max-w-[480px] px-margin-mobile md:px-0">
<div class="bg-surface/60 backdrop-blur-[20px] rounded-xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.4),_0_2px_4px_rgba(0,0,0,0.2)] p-10 relative overflow-hidden">
<!-- Inner Glow -->
<div class="absolute -top-24 -left-24 w-48 h-48 bg-primary/20 rounded-full blur-[64px] pointer-events-none"></div>
<!-- Header -->
<div class="text-center mb-10 relative z-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container border border-outline-variant/30 mb-6 shadow-inner">
<span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">
                        monitoring
                    </span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2 tracking-tight">Chào mừng quay lại</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Đăng nhập để truy cập phân tích chuyên sâu.</p>
</div>
<!-- Form -->
<form class="space-y-6 relative z-10">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface block uppercase tracking-wider" for="email">Địa chỉ Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">
                            mail
                        </span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/30 rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="email" placeholder="name@domain.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface block uppercase tracking-wider" for="password">Mật khẩu</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-secondary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">
                            lock
                        </span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/30 rounded-lg py-3 pl-12 pr-12 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center pt-2">
<input class="w-4 h-4 rounded border-outline-variant/30 bg-surface-container-lowest text-primary focus:ring-primary focus:ring-offset-background cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-3 font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">Ghi nhớ đăng nhập</label>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-secondary-container to-secondary text-on-secondary-container font-headline-md text-headline-md py-4 rounded-lg shadow-[0_0_20px_rgba(78,222,163,0.15)] hover:shadow-[0_0_25px_rgba(78,222,163,0.3)] hover:brightness-110 transition-all duration-300 relative overflow-hidden group" type="submit">
<span class="relative z-10 flex items-center justify-center gap-2">
                            Đăng nhập
                            <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
</button>
</div>
</form>
<!-- Footer -->
<div class="mt-8 text-center border-t border-outline-variant/20 pt-6 relative z-10">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Chưa có tài khoản? 
                    <a class="text-on-surface font-semibold hover:text-secondary transition-colors ml-1" href="#">Đăng ký ngay</a>
</p>
</div>
</div>
</main>
</body></html>
